<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style> body { margin: 0; padding: 22px; background: var(--surface); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs } = window.VisitPrepDesignSystem_2c5c4e;
  function Demo() {
    const [tab, setTab] = React.useState('symptoms');
    React.useEffect(() => { lucide.createIcons(); });
    return (
      <Tabs value={tab} onChange={setTab} tabs={[
        {value:'symptoms', label:'Symptoms', icon:'activity'},
        {value:'wearables', label:'Wearables', icon:'heart-pulse'},
        {value:'timeline', label:'Timeline', icon:'calendar-days', count:30},
        {value:'evidence', label:'Evidence', icon:'search-check'},
      ]} />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(() => lucide.createIcons(), 60);
</script>
</body>
</html>
