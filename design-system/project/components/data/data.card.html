<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px 22px; background: var(--canvas); }
  .lbl { font-size: 10px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin: 0 0 10px; }
  .card { background: var(--surface); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 16px; }
  .grid { display:grid; grid-template-columns: 1.1fr 1fr; gap: 14px; align-items: start; }
  .spark { display:flex; align-items:center; justify-content:space-between; gap:10px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
  .spark:last-child { border-bottom: none; }
  .sl { font-size: 12px; color: var(--text-body); }
  .sv { font-family: var(--font-mono); font-size: 13px; color: var(--text-strong); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="grid" id="root"></div>
<script type="text/babel">
  const { MiniBarChart, Sparkline } = window.VisitPrepDesignSystem_2c5c4e;
  function Demo() {
    return (
      <React.Fragment>
        <div className="card">
          <div className="lbl">Symptom frequency · 30 days</div>
          <MiniBarChart unit=" d" data={[
            {label:'nausea', value:6, color:'var(--viz-amber)'},
            {label:'low appetite', value:5},
            {label:'fatigue', value:4},
            {label:'poor sleep', value:3},
            {label:'bloating', value:2},
            {label:'vomiting', value:1, color:'var(--viz-clay)'},
          ]} />
        </div>
        <div className="card">
          <div className="lbl">Wearable trends</div>
          <div className="spark"><span className="sl">Weight</span><Sparkline width={120} height={34} values={[214,213.2,212.6,211.8,211.1,210.6]} /><span className="sv">210.6</span></div>
          <div className="spark"><span className="sl">Sleep</span><Sparkline width={120} height={34} color="var(--viz-slate)" values={[6.2,6.8,7.1,6.5,7.4,7.1]} /><span className="sv">7.1 h</span></div>
          <div className="spark"><span className="sl">Resting HR</span><Sparkline width={120} height={34} color="var(--viz-slate)" fill={false} values={[66,64,65,63,62,62]} /><span className="sv">62 bpm</span></div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
