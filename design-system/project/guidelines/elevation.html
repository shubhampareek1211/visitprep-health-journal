<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation" subtitle="Borders first; shadow only for floating surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 22px; background: var(--canvas); }
  .row { display:flex; gap: 20px; }
  .item { text-align:center; flex:1; }
  .box { height: 64px; background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .v { font-size: 11px; color: var(--text-strong); font-weight:600; margin-top:11px; }
  .t { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="v">xs</div><div class="t">resting card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="v">sm</div><div class="t">hover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="v">md</div><div class="t">raised</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="v">lg</div><div class="t">menu / popover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="v">xl</div><div class="t">dialog</div></div>
  </div>
</body>
</html>
