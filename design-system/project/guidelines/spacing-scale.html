<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid · compact clinical density" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--surface); }
  .row { display:flex; align-items:flex-end; gap: 16px; }
  .item { text-align:center; }
  .bar { background: var(--teal-200); border-radius: var(--radius-xs); width: 100%; }
  .v { font-size: 11px; color: var(--text-strong); font-weight:600; margin-top:7px; }
  .t { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="t">space-1</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="t">space-2</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="t">space-3</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="t">space-4</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="v">20</div><div class="t">space-5</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="t">space-6</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="t">space-8</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="t">space-12</div></div>
  </div>
</body>
</html>
