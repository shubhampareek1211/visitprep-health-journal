<!-- @dsCard group="Type" viewport="700x250" name="Type Scale" subtitle="Public Sans · modest display sizes for a workspace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--surface); }
  .line { display:flex; align-items:baseline; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); width: 132px; flex:none; }
  .spec { color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="line"><span class="tok">display · 30/700</span><span class="spec" style="font-size:30px;font-weight:700;letter-spacing:-.01em">−3.4 lb</span></div>
  <div class="line"><span class="tok">h1 · 24/600</span><span class="spec" style="font-size:24px;font-weight:600">Patient overview</span></div>
  <div class="line"><span class="tok">h2 · 19/600</span><span class="spec" style="font-size:19px;font-weight:600">Extracted symptom signals</span></div>
  <div class="line"><span class="tok">h3 · 16/600</span><span class="spec" style="font-size:16px;font-weight:600">Recent journal notes</span></div>
  <div class="line"><span class="tok">base · 14/400</span><span class="spec" style="font-size:14px">Nausea reported on 6 of 30 days.</span></div>
  <div class="line"><span class="tok">sm · 13/400</span><span class="spec" style="font-size:13px;color:var(--text-body)">Patient-reported notes are the source.</span></div>
  <div class="line"><span class="tok">xs · 12/500</span><span class="spec" style="font-size:12px;color:var(--text-muted)">Within 48 h of injection</span></div>
</body>
</html>
