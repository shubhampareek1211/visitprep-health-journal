<!-- @dsCard group="Colors" viewport="700x150" name="Neutral — Cool Gray" subtitle="Carries ~90% of every surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--surface); }
  .row { display: flex; gap: 7px; }
  .sw { flex: 1; }
  .chip { height: 52px; border-radius: var(--radius-sm); border: 1px solid rgba(21,26,29,.06); }
  .name { font-size: 10.5px; color: var(--text-strong); font-weight: 600; margin-top: 7px; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gray-25)"></div><div class="name">25</div><div class="hex">#fafbfb</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><div class="name">50</div><div class="hex">#f5f7f7</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="name">100</div><div class="hex">#eef1f2</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="name">200</div><div class="hex">#dce1e3</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="name">300</div><div class="hex">#c3cbcf</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="name">400</div><div class="hex">#98a3a9</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="name">500</div><div class="hex">#6a757c</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="name">700</div><div class="hex">#353d42</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="name">900</div><div class="hex">#151a1d</div></div>
  </div>
</body>
</html>
